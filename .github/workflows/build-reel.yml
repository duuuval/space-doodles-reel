name: Build Reel

permissions:
  contents: write

on:
  push:
    # Run on any push (keeps it simple / reliable)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build reel.mp4 from public/videos (oldest -> newest by filename)
        run: |
          set -e
          mkdir -p public
          # Create list in a temp file (so it doesn't show up as an untracked file)
          ls -1 public/videos/*.mp4 | sort | sed "s|^|file '|;s|$|'|" > /tmp/videos.txt

          # Force overwrite (-y) so it never prompts
          ffmpeg -y -f concat -safe 0 -i /tmp/videos.txt -c copy public/reel.mp4

      - name: Commit reel.mp4 (only if changed)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add public/reel.mp4

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to reel.mp4; skipping commit."
            exit 0
          fi

          git commit -m "Update reel.mp4"
          git push
