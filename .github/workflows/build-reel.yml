name: Build Reel

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create video list
        run: |
          ls public/videos/*.mp4 | sed "s/^/file '/;s/$/'/" > videos.txt

      - name: Merge videos
        run: |
          ffmpeg -f concat -safe 0 -i videos.txt -c copy public/reel.mp4

      - name: Commit reel
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/reel.mp4
          git commit -m "Update reel"
          git push
