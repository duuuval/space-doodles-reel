<!DOCTYPE html>
<html>
<head>
<title>Space Doodles Reel</title>
</head>

<body style="margin:0;background:black;display:flex;align-items:center;justify-content:center;height:100vh;">

<video id="player" controls autoplay muted width="900">
  <source src="/videos/2215.mp4" type="video/mp4">
</video>

<script>

const videos = [
"/videos/2215.mp4",
"/videos/5421.mp4"
];

let i = 0;
const player = document.getElementById("player");

player.onended = () => {
  i = (i + 1) % videos.length;
  player.src = videos[i];
  player.play();
};

</script>

</body>
</html>
