<!DOCTYPE html>
<html>
<body style="margin:0;background:black;display:flex;align-items:center;justify-content:center;height:100vh;">

<div style="position:relative;width:900px">

<video id="v1" autoplay muted width="900" style="position:absolute"></video>
<video id="v2" muted width="900" style="position:absolute"></video>

</div>

<script>

const videos = [
"/videos/2215.mp4",
"/videos/5421.mp4"
];

let i = 0;

const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");

let active = v1;
let preload = v2;

active.src = videos[0];
preload.src = videos[1];

active.play();

active.onended = switchVideo;

function switchVideo(){

  const temp = active;
  active = preload;
  preload = temp;

  active.style.zIndex = 1;
  preload.style.zIndex = 0;

  active.play();

  i = (i + 1) % videos.length;

  const next = videos[(i + 1) % videos.length];

  preload.src = next;

}

</script>

</body>
</html>
