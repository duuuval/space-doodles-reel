<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Reel</title>

    <style>
      :root{
        /* Replace /bg.jpg with your Doodles space background image */
        --bg-image: url("/bg.jpeg");
      }

      html, body {
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      /* Background */
      body::before{
        content:"";
        position: fixed;
        inset: 0;
        background-image: var(--bg-image);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        filter: saturate(1.05) contrast(1.05);
        transform: scale(1.02); /* tiny scale to avoid edge gaps */
        z-index: 0;
      }

      /* Soft overlay for readability + vibe */
      body::after{
        content:"";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(1200px 800px at 20% 20%, rgba(255, 86, 187, 0.18), transparent 60%),
          radial-gradient(1200px 800px at 80% 30%, rgba(0, 230, 255, 0.16), transparent 60%),
          linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,.55));
        pointer-events: none;
        z-index: 1;
      }

      /* Centered player */
      .wrap{
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: clamp(12px, 3vw, 24px);
        box-sizing: border-box;
        z-index: 2;
      }

      video{
        width: min(720px, 100%);
        height: auto;
        aspect-ratio: 1/1;
        max-height: calc(100dvh - 24px);
        background: rgba(0,0,0,0.4);
        border-radius: 18px;
        box-shadow:
          0 24px 80px rgba(0,0,0,.55),
          0 0 0 1px rgba(255,255,255,.10);
        outline: none;
        backdrop-filter: blur(2px);
      }

      /* If the video is vertical (some clips might be), let it fit nicely */
      @media (max-aspect-ratio: 16/10){
        video{
          max-height: calc(100dvh - 24px);
        }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <video
        id="reel"
        src="/reel.mp4"
        controls
        playsinline
        preload="metadata"
        loop
      ></video>
    </div>

    <script>
      // Optional tiny UX: if autoplay is allowed, try it muted.
      // If blocked, user can hit play normally.
      const v = document.getElementById("reel");
      (async () => {
        try {
          v.muted = true;
          await v.play();
        } catch (_) {
          // Autoplay blocked — leave controls for user interaction
        }
      })();
    </script>
  </body>
</html>
