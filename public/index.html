<!DOCTYPE html>
<html>
<body style="margin:0;background:black;display:flex;align-items:center;justify-content:center;height:100vh;">

<div style="position:relative;width:900px;height:506px">

<video id="v1" controls autoplay width="900" style="position:absolute;top:0;left:0"></video>
<video id="v2" width="900" style="position:absolute;top:0;left:0;display:none"></video>

</div>

<script>

const videos = [
"/videos/2215.mp4",
"/videos/5421.mp4"
];

let index = 0;

const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");

let current = v1;
let next = v2;

current.src = videos[0];
next.src = videos[1];

current.play();

current.onended = () => {

  current.style.display = "none";
  next.style.display = "block";

  next.play();

  const temp = current;
  current = next;
  next = temp;

  index = (index + 1) % videos.length;

  const upcoming = videos[(index + 1) % videos.length];

  next.src = upcoming;

};

</script>

</body>
</html>
