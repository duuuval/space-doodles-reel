<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Space Doodles Reel</title>

  <style>
    :root{
      --pink:#FF4FD8; --purple:#8B5CFF; --blue:#2ED3FF; --yellow:#FFE86B; --mint:#2BFFB9;
      --ink:#0B0F1A; --line:rgba(255,255,255,.18); --card:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92); --muted:rgba(255,255,255,.70);
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; padding:18px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 600px at 15% 15%, rgba(255,79,216,.35), transparent 60%),
        radial-gradient(900px 600px at 85% 20%, rgba(46,211,255,.35), transparent 60%),
        radial-gradient(900px 700px at 50% 95%, rgba(43,255,185,.28), transparent 62%),
        linear-gradient(180deg, #0b0f1a 0%, #090b12 100%);
      display:flex; align-items:center; justify-content:center;
    }
    .wrap{width:min(980px,100%); display:grid; gap:12px;}
    .bar{display:flex; justify-content:space-between; align-items:center; gap:12px;}
    .title{display:flex; align-items:center; gap:10px;}
    .dot{width:14px;height:14px;border-radius:999px;background:conic-gradient(from 180deg,var(--pink),var(--purple),var(--blue),var(--mint),var(--yellow),var(--pink))}
    .card{
      background:var(--card); border:1px solid var(--line);
      border-radius:18px; overflow:hidden; backdrop-filter: blur(10px);
      box-shadow:0 18px 60px rgba(0,0,0,.35);
    }
    .player{aspect-ratio:16/9; background:#000;}
    video{width:100%;height:100%;display:block;object-fit:contain;background:#000;}
    .footer{display:flex; gap:10px; flex-wrap:wrap; justify-content:space-between; padding:10px 12px;}
    .pill{border:1px solid var(--line); background:rgba(255,255,255,.06); padding:7px 10px; border-radius:999px; font-size:12px; color:var(--muted);}
    .pill b{color:var(--text)}
    .err{display:none; padding:10px 12px; border-top:1px solid var(--line); background:rgba(255,80,120,.10); color:#FFD0D0; font-size:13px;}
    .err.show{display:block;}
    button{
      border:0; cursor:pointer; border-radius:999px; padding:10px 14px; font-weight:800; color:#0B0F1A;
      background: linear-gradient(90deg, var(--yellow), var(--mint), var(--blue));
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <div class="title">
        <div class="dot"></div>
        <div>
          <div style="font-weight:800;">Space Doodles Reel</div>
          <div style="font-size:12px;color:var(--muted);">Simple playlist player</div>
        </div>
      </div>
      <button id="start">Start</button>
    </div>

    <div class="card">
      <div class="player">
        <video id="v" playsinline preload="metadata" controls>
          <source id="src" type="video/mp4" />
        </video>
      </div>
      <div class="footer">
        <div class="pill">Clips: <b id="count">0</b></div>
        <div class="pill">Now: <b id="now">—</b></div>
        <div class="pill">Muted: <b id="muted">true</b></div>
      </div>
      <div class="err" id="err"></div>
    </div>
  </div>

  <script>
    const v = document.getElementById('v');
const srcEl = document.getElementById('src');
const startBtn = document.getElementById('start');
const countEl = document.getElementById('count');
const nowEl = document.getElementById('now');
const mutedEl = document.getElementById('muted');
const errEl = document.getElementById('err');

let list = [];
let i = 0;

function showErr(msg){
  errEl.textContent = msg;
  errEl.classList.add('show');
  console.error(msg);
}

function clearErr(){
  errEl.textContent = '';
  errEl.classList.remove('show');
}

function label(path){
  const p = path.split('/');
  return p[p.length - 1];
}

async function loadPlaylist(){
  const res = await fetch('/playlist.json');
  const data = await res.json();
  return data;
}

async function playIndex(idx){
  clearErr();

  i = idx % list.length;

  const rel = list[i];
  const url = rel.startsWith('/') ? rel : '/' + rel;

  nowEl.textContent = label(rel);

  srcEl.src = url;
  v.load();

  try{
    await v.play();
  }catch(e){
    showErr(`${e.name}: ${e.message}`);
  }
}

v.addEventListener('ended', () => {
  playIndex(i + 1);
});

v.addEventListener('error', () => {
  showErr("Video failed to load: " + srcEl.src);
});

startBtn.addEventListener('click', () => {
  v.muted = false;
  mutedEl.textContent = String(v.muted);
  playIndex(i);
});

async function init(){
  try{
    list = await loadPlaylist();
    countEl.textContent = list.length;

    // preload first clip but do not autoplay
    srcEl.src = "/" + list[0];
    v.load();

  }catch(e){
    showErr(e.message);
  }
}

init();

  </script>
</body>
</html>
